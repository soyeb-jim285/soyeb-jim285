name: Refresh profile

on:
  schedule:
    - cron: "17 3 * * *"     # daily, 03:17 UTC
  workflow_dispatch:           # manual run button
  push:
    branches: [main]
    paths:
      - scripts/gen_pathfinding.py
      - scripts/gen_statscard.py
      - .github/workflows/pathfinding.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Fetch contribution calendar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
            query($login: String!) {
              user(login: $login) {
                contributionsCollection {
                  contributionCalendar {
                    weeks { contributionDays { weekday contributionCount contributionLevel } }
                  }
                }
              }
            }' -F login=soyeb-jim285 > calendar.json

      - name: Fetch profile stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
            query($login: String!) {
              user(login: $login) {
                name login createdAt followers { totalCount }
                repositories(first: 100, ownerAffiliations: OWNER, isFork: false) {
                  totalCount
                  nodes {
                    stargazerCount
                    languages(first: 5, orderBy: {field: SIZE, direction: DESC}) {
                      edges { size node { name } }
                    }
                  }
                }
                contributionsCollection {
                  totalCommitContributions totalPullRequestContributions totalIssueContributions
                  contributionCalendar { totalContributions }
                }
              }
            }' -F login=soyeb-jim285 > profile.json

      - name: Generate SVGs
        run: |
          python3 scripts/gen_pathfinding.py
          python3 scripts/gen_statscard.py

      - name: Commit if changed
        run: |
          rm -f calendar.json profile.json
          if git diff --quiet -- assets/pathfinding.svg assets/statscard.svg; then
            echo "no change"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/pathfinding.svg assets/statscard.svg
            git commit -m "chore: refresh profile (A* + stats card)"
            git push
          fi
