name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:        # manual run button
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: soyeb-jim285
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=f5eedd&color_dots=161b22,1a423d,2a9d8a,36e2c3,a8f0e3
            dist/github-contribution-grid-snake.svg?color_snake=147b6d&color_dots=ebedf0,a8d8cf,5cbfae,2a9d8a,147b6d

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
